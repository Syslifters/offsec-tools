# PostMatchRules"
- id: DiscardPostMatchByName
  type: File
  description: Post-match check for specific filenames
  action: Discard
  location: FileName
  patterns:
    - ^credentialprovider\.idl$
    - ^pspasswd64\.exe$
    - ^pspasswd\.exe$
    - ^psexec\.exe$
    - ^psexec64\.exe$
  severity: Info

- id: DiscardPostMatchByPath
  type: File
  description: Post-match check for specific path elements
  action: Discard
  location: FilePath
  patterns:
    - Windows Kits\\10
    - Git\\mingw64
    - Git\\usr\\lib
    - ProgramData\\Microsoft\\NetFramework\\BreadcrumbStore
    - \.MSSQLSERVER\\MSSQL\\Binn\\Templates
  severity: Info

# Custom
- id: KeepWritableNetlogon
  type: File
  description: Files that are writable and in the NETLOGON share.
  action: Keep
  location: ShareName
  patterns:
    - ^NETLOGON$
  ntfs:
    writable: true
  severity: High

# FileRules/Keep/Code"
- id: KeepSlackTokensInCode
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - (xox[pboa]-[0-9]{12}-[0-9]{12}-[0-9]{12}-[a-z0-9]{32})
    - https://hooks.slack.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}
  severity: High

- id: KeepSqlAccountCreation
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - CREATE (USER|LOGIN) .{0,200} (IDENTIFIED BY|WITH PASSWORD)
  severity: High

#- id: KeepS3UriPrefixInCode
#  type: File
#  description: Files with content matching an AWS S3 or Apache Hadoop S3A URI Prefix
#  action: Keep
#  location: FileContent
#  patterns:
#    - s3[a]?:\/\/[a-zA-Z0-9\-\+\/]{2,16}
#  severity: Medium

- id: KeepAwsKeysInCode
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - aws[_\-\.]?key
    - (\s|\'|\"|\^|=)(A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z2-7]{12,16}(\s|\'|\"|$)
  severity: High

- id: KeepDbConnStringPw
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - connectionstring.{1,200}passw
  severity: Medium

- id: KeepPassOrKeyInCode
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - passw?o?r?d\s*=\s*[\'\"][^\'\"]....
    - api[Kk]ey\s*=\s*[\'\"][^\'\"]....
    - passw?o?r?d?>\s*[^\s<]+\s*<
    - passw?o?r?d?>.{3,2000}</pass
    - '[\s]+-passw?o?r?d?'
    - api[kK]ey>\s*[^\s<]+\s*<
    - '[_\-\.]oauth\s*=\s*[\''\"][^\''\"]....'
    - client_secret\s*=*\s*
    - <ExtendedMatchKey>ClientAuth
    - GIUserPassword
  severity: High

- id: KeepInlinePrivateKey
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - "-----BEGIN( RSA| OPENSSH| DSA| EC| PGP)? PRIVATE KEY( BLOCK)?-----"
  severity: High

# FileRules/Keep/Code/Cmd"
- id: KeepCmdCredentials
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - passwo?r?d\s*=\s*[\'\"][^\'\"]....
    - schtasks.{1,300}(/rp\s|/p\s)
    - "net user "
    - "psexec .{0,100} -p "
    - "net use .{0,300} /user:"
    - "cmdkey "
  severity: High

- id: RelayCmdByExtension
  type: File
  description:
    Files with these extensions will be searched for cmd.exe/batch file
    related strings.
  action: Match
  location: FileExtension
  patterns:
    - \.bat
    - \.cmd
  relay:
    - KeepCmdCredentials
    - KeepAwsKeysInCode
    - KeepInlinePrivateKey
    - KeepPassOrKeyInCode
    - KeepSlackTokensInCode
    - KeepSqlAccountCreation
  severity: Info

