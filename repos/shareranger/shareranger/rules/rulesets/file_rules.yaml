- id: KeepCSharpViewstateKeys
  type: File
  description: Files with contents matching these regexen are very interesting.
  action: Keep
  location: FileContent
  patterns:
    - validationkey\s*=\s*[\'\"][^\'\"]....
    - decryptionkey\s*=\s*[\'\"][^\'\"]....
  severity: High

- id: KeepCSharpDbConnStringsYellow
  type: File
  description:
    Match SQL connection strings that appear to use integrated security
    (so no passwords).
  action: Keep
  location: FileContent
  patterns:
    - Data Source=.+Integrated Security=(SSPI|true)
    - Integrated Security=(SSPI|true);.*Data Source=.+
  severity: Medium

- id: KeepCSharpDbConnStringsRed
  type: File
  description: Match SQL connection strings that appear to have a password.
  action: Keep
  location: FileContent
  patterns:
    - Data Source=.+(;|)Password=.+(;|)
    - Password=.+(;|)Data Source=.+(;|)
  severity: High

